name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Publish the library crate to crates.io.
  publish-crate:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # libtumpa's default features pull in wecanencrypt's `card` feature,
      # which links against libpcsclite — needed for `cargo publish`
      # (which compiles the crate during verification) to succeed.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pcscd libpcsclite-dev libsqlite3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Verify tag matches crate version
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match crate version v${version}" >&2
            exit 1
          fi

      - name: Verify publishable package
        run: cargo publish --locked --dry-run

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Create a GitHub Release with auto-generated notes. No binaries attached
  # because libtumpa is a library crate; consumers get it from crates.io.
  release:
    needs: publish-crate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
